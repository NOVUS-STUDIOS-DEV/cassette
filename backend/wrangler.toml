name = "cassette-backend"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Shared cassette registry (the paid team layer).
[[r2_buckets]]
binding = "REGISTRY"
bucket_name = "cassette-registry"

# Audit log + seats. Create: npx wrangler d1 create cassette-db, then apply schema.sql
[[d1_databases]]
binding = "DB"
database_name = "cassette-db"
database_id = "f2d57c3d-2df4-4382-87e2-484d9d0c6829"

# Secrets (set with `wrangler secret put <NAME>`): GITHUB_APP_ID, GITHUB_APP_PRIVATE_KEY,
# GITHUB_WEBHOOK_SECRET, STRIPE_WEBHOOK_SECRET

[vars]
# Stripe per-seat price (LIVE). Not secret.
STRIPE_PRICE_ID = "price_1TfQG9GiicWlVwePB4vwRKfN"

[observability]
enabled = true
