name = "cassette-gateway"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# R2 bucket holding content-addressed cassettes.
# Create once with: npx wrangler r2 bucket create cassettes
[[r2_buckets]]
binding = "CASSETTES"
bucket_name = "cassettes"

[vars]
# record | replay | auto  — overridden per-request by the <mode> path segment
DEFAULT_MODE = "auto"

[observability]
enabled = true
